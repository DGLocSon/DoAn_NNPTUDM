services:
  mongodb:
    image: mongo:6.0
    container_name: my_mongodb_replica
    # Lệnh này cực kỳ quan trọng để bật tính năng Replica Set
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: